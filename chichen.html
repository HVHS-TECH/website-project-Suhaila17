    <div class="intro2">
      <h1>Chichen Itza: The Mayan Legacy</h1>
      <p>Chichen Itza is an ancient Mayan city located on the Yucatán Peninsula in Mexico. Once a powerful city-state, 
        Chichen Itza served as the political, economic, and religious center of the Mayan civilization. Today, it stands as one of
         the most important archaeological sites of ancient Mesoamerica and a UNESCO World Heritage Site.</p>
    </div>

    <div class="border"></div>

    <div class="intro2">
      <h2>Chichen Itza’s Origins</h2>
      <p>Founded in the 5th century AD, Chichen Itza rose to prominence in the 7th century. The city was a hub for trade, culture, 
        and religion. The Maya constructed many remarkable structures, including the iconic El Castillo (Temple of Kukulcán), a pyramid that 
        doubles as an astronomical calendar.</p>
    </div>

    <div class="border"></div>

    <div class="intro2">
      <h2>Fascinating Features of Chichen Itza</h2>
      <ul>
        <li>Astronomical Significance: The pyramid’s design is aligned with the movements of the sun, moon, and stars, showcasing the Maya’s 
          advanced knowledge of astronomy.</li>
        <li>The Ball Court: Chichen Itza also features the Great Ball Court, where the Maya played a ceremonial ball game that held both religious and political significance.</li>
        <li>The Sacred Cenote: The Sacred Cenote was used for sacrifices and rituals, with offerings placed in the deep water as a means of appeasing the gods.</li>
      </ul>
    </div>

     <div class="border"></div>
     
     <div class="intro2">
      <h2>Fun Facts About Chichen Itza</h2>
      <ol>
        <li>Mayan Calendar: The Temple of Kukulcán functions as a giant calendar, with 365 steps—one for each day of the year.</li>
        <li>The Ball Game: The ancient Maya ball game was played with a rubber ball, and its outcome could sometimes determine the fate of players.</li>
        <li>A UNESCO World Heritage Site: Chichen Itza is one of Mexico’s most famous landmarks and was designated a UNESCO World Heritage Site in 1988.</li>
      </ol>
     </div>

     <div class="border"></div>

     <div class="intro2">
      <h2>Why Visit Chichen Itza?</h2>
      <p>Visiting Chichen Itza offers a glimpse into the ancient Mayan civilization and its advanced knowledge of science, astronomy, and architecture. The site’s dramatic ruins, especially the Temple of Kukulcán, draw visitors from all over the world to witness the grandeur and mystery of this ancient city.</p>
     </div>

     <div class="border"></div>

     <div class="intro2">
      <h2>Conclusion: A Glimpse into the Past</h2>
      <p>Chichen Itza stands as a testament to the ingenuity and cultural richness of the Mayan civilization. Its stunning architecture, astronomical precision, and fascinating history continue to inspire awe in visitors today.</p>
